<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>QWE Archive - Delta Force Armory</title>
<!-- 引入赛博科幻风字体 -->
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&display=swap" rel="stylesheet">

<style>
:root {
  --neon-red: #ff003c;
  --neon-red-glow: rgba(255, 0, 60, 0.6);
  --dark-glass: rgba(10, 10, 10, 0.65);
  --panel-border: rgba(255, 0, 60, 0.3);
}

* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
}

body {
  font-family: 'Orbitron', "Microsoft YaHei", sans-serif;
  overflow: hidden;
  background: #050505;
  color: white;
}

.hero {
  height: 100vh;
  width: 100%;
  position: relative;
  overflow: hidden;
}

.hero-bg {
  position: absolute;
  top: -5%;
  left: -5%;
  width: 110%;
  height: 110%;
  background: url("https://images.unsplash.com/photo-1605806616949-1e87b487cb2a?q=80&w=1920&auto=format&fit=crop");
  background-size: cover;
  background-position: center;
  background-repeat: no-repeat;
  transition: transform 0.1s ease-out;
  z-index: 1;
}

#particles-canvas {
  position: absolute;
  top: 0; left: 0; width: 100%; height: 100%;
  z-index: 2; pointer-events: none;
}

.overlay {
  position: absolute; inset: 0; z-index: 3; pointer-events: none;
  background: radial-gradient(
    circle 800px at var(--mouse-x, 50%) var(--mouse-y, 50%),
    rgba(255, 0, 60, 0.1) 0%, rgba(0, 0, 0, 0.7) 40%, rgba(0, 0, 0, 0.95) 100%
  );
}

.main-container {
  position: absolute;
  top: 50%; left: 50%;
  transform: translate(-50%, -50%);
  width: 90%; max-width: 1200px;
  height: 85vh;
  z-index: 10;
  display: flex;
  flex-direction: column;
  animation: contentFadeIn 1s cubic-bezier(0.2, 0.8, 0.2, 1) forwards;
}

@keyframes contentFadeIn {
  from { opacity: 0; transform: translate(-50%, -48%); }
  to { opacity: 1; transform: translate(-50%, -50%); }
}

/* 顶部标题与时钟 */
.header-bar {
  display: flex;
  justify-content: space-between;
  align-items: flex-end;
  margin-bottom: 20px;
  padding: 0 10px;
}

.title-box .title {
  font-size: 40px; font-weight: 900; letter-spacing: 3px;
  text-shadow: 0 0 10px var(--neon-red), 0 0 20px var(--neon-red);
}
.title-box .subtitle {
  font-size: 14px; color: #aaa; letter-spacing: 4px; margin-top: 5px;
}
.clock {
  font-size: 24px; font-weight: 700; color: var(--neon-red);
  text-shadow: 0 0 15px var(--neon-red-glow);
}

.control-panel {
  display: flex;
  gap: 15px;
  margin-bottom: 20px;
  background: var(--dark-glass);
  padding: 15px;
  border-radius: 8px;
  border: 1px solid var(--panel-border);
  backdrop-filter: blur(10px);
  box-shadow: 0 0 20px rgba(0,0,0,0.5);
  flex-wrap: wrap;
}

.input-field {
  flex: 1;
  min-width: 200px;
  background: rgba(255,255,255,0.05);
  border: 1px solid rgba(255,0,60,0.5);
  color: white;
  padding: 12px 20px;
  font-size: 16px;
  font-family: inherit;
  border-radius: 4px;
  outline: none;
  transition: all 0.3s;
}

.input-field:focus {
  border-color: var(--neon-red);
  box-shadow: 0 0 10px var(--neon-red-glow);
  background: rgba(255,0,60,0.1);
}

select.input-field {
  flex: none; width: 180px; cursor: pointer;
}
select.input-field option {
  background: #111; color: white;
}

.btn-primary {
  background: rgba(255,0,60,0.2);
  color: white;
  border: 1px solid var(--neon-red);
  padding: 0 25px;
  font-size: 16px;
  font-weight: bold;
  cursor: pointer;
  border-radius: 4px;
  transition: 0.3s;
  text-transform: uppercase;
  letter-spacing: 1px;
}

.btn-primary:hover {
  background: var(--neon-red);
  box-shadow: 0 0 15px var(--neon-red-glow);
  transform: translateY(-2px);
}

.data-grid {
  flex: 1;
  overflow-y: auto;
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
  gap: 20px;
  padding-right: 10px;
}

/* 自定义滚动条 */
.data-grid::-webkit-scrollbar { width: 8px; }
.data-grid::-webkit-scrollbar-track { background: rgba(255,255,255,0.05); border-radius: 4px; }
.data-grid::-webkit-scrollbar-thumb { background: var(--neon-red); border-radius: 4px; }

.card {
  background: var(--dark-glass);
  border: 1px solid var(--panel-border);
  border-radius: 8px;
  padding: 20px;
  backdrop-filter: blur(5px);
  transition: transform 0.3s, box-shadow 0.3s, border-color 0.3s;
  display: flex;
  flex-direction: column;
  position: relative;
  overflow: hidden;
}

.card:hover {
  transform: translateY(-5px);
  border-color: var(--neon-red);
  box-shadow: 0 5px 20px var(--neon-red-glow);
}

/* 卡片划过光效 */
.card::before {
  content: ''; position: absolute; top: 0; left: -100%; width: 50%; height: 100%;
  background: linear-gradient(to right, transparent, rgba(255,255,255,0.1), transparent);
  transform: skewX(-25deg); transition: 0.5s; pointer-events: none;
}
.card:hover::before { left: 150%; }

.card-header {
  display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px;
}

.gun-name { font-size: 24px; font-weight: 700; color: white; text-shadow: 0 0 5px rgba(255,255,255,0.5); }
.gun-type {
  font-size: 12px; padding: 4px 8px; background: rgba(255,0,60,0.2);
  border: 1px solid var(--neon-red); border-radius: 4px; color: var(--neon-red);
}

.gun-desc { 
  font-size: 14px; color: #aaa; margin-bottom: 20px; flex: 1; line-height: 1.5; font-family: "Microsoft YaHei", sans-serif;
  word-wrap: break-word; /* 修复点 1：允许长单词换行 */
  word-break: break-all; /* 修复点 1：强制打断过长连续字符，防止撑破边框 */
}

.code-box {
  display: flex;
  background: rgba(0,0,0,0.8);
  border: 1px solid #333;
  border-radius: 4px;
  overflow: hidden;
  width: 100%; /* 修复点 2：严格限制宽度不超过卡片 */
}

.code-text {
  flex: 1; 
  min-width: 0; /* 修复点 3：极其关键，解决 flex 子元素被长文本强行撑开的 bug */
  padding: 10px; font-family: monospace; font-size: 14px; color: #0f0;
  white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
  line-height: 20px;
}

.copy-btn {
  background: rgba(255,0,60,0.2); color: white; border: none; padding: 0 15px;
  cursor: pointer; font-weight: bold; font-family: inherit; transition: 0.3s;
  border-left: 1px solid var(--neon-red);
  flex-shrink: 0; /* 防止按钮被挤压变形 */
}

.copy-btn:hover { background: var(--neon-red); }
.copy-btn.copied { background: #0f0; color: black; border-left-color: #0f0; }

.empty-state {
  grid-column: 1 / -1; text-align: center; padding: 50px; color: #666; font-size: 18px;
}

/* 修复点 4：手机端与小屏幕自适应，防止标题超框 */
@media (max-width: 768px) {
  .header-bar { flex-direction: column; align-items: flex-start; gap: 10px; }
  .title-box .title { font-size: 28px; }
  .data-grid { grid-template-columns: repeat(auto-fill, minmax(100%, 1fr)); }
  .main-container { width: 95%; }
}

/* 模态框 (弹窗) 样式 */
.modal-overlay {
  position: fixed; top: 0; left: 0; width: 100%; height: 100%;
  background: rgba(0, 0, 0, 0.85);
  backdrop-filter: blur(10px);
  z-index: 100;
  display: flex; justify-content: center; align-items: center;
  opacity: 0; pointer-events: none; transition: 0.3s;
}

.modal-overlay.active {
  opacity: 1; pointer-events: all;
}

.modal-box {
  background: #0a0a0a;
  border: 1px solid var(--neon-red);
  box-shadow: 0 0 30px rgba(255, 0, 60, 0.3);
  width: 90%; max-width: 500px;
  padding: 30px;
  border-radius: 8px;
  transform: translateY(-20px);
  transition: 0.3s;
  position: relative;
}

.modal-overlay.active .modal-box {
  transform: translateY(0);
}

.modal-header {
  font-size: 24px; font-weight: 700; color: var(--neon-red);
  margin-bottom: 20px; text-shadow: 0 0 10px var(--neon-red-glow);
}

.close-modal {
  position: absolute; top: 20px; right: 20px;
  background: none; border: none; color: white; font-size: 24px;
  cursor: pointer; transition: 0.2s;
}
.close-modal:hover { color: var(--neon-red); }

.form-group { margin-bottom: 15px; }
.form-group label {
  display: block; margin-bottom: 5px; font-size: 14px; color: #aaa;
}
.form-group input, .form-group select, .form-group textarea {
  width: 100%;
}
.form-group textarea {
  resize: vertical; min-height: 80px;
}

.submit-btn {
  width: 100%; margin-top: 10px; padding: 15px;
}

</style>
</head>

<body>

<div class="hero">

<script>
//// 1. 实时时钟系统
function updateClock(){
  const now = new Date();
  const h = String(now.getHours()).padStart(2, '0');
  const m = String(now.getMinutes()).padStart(2, '0');
  const s = String(now.getSeconds()).padStart(2, '0');
  document.getElementById("clock").innerHTML = `${h}:${m}:${s}`;
}
setInterval(updateClock, 1000);
updateClock();

// 2. 鼠标互动系统
const heroBg = document.getElementById('hero-bg');
const overlay = document.getElementById('overlay');

document.addEventListener('mousemove', (e) => {
  const x = e.clientX, y = e.clientY;
  overlay.style.setProperty('--mouse-x', `${x}px`);
  overlay.style.setProperty('--mouse-y', `${y}px`);
  
  const offsetX = (x - window.innerWidth / 2) / 50; 
  const offsetY = (y - window.innerHeight / 2) / 50;
  heroBg.style.transform = `translate(${offsetX}px, ${offsetY}px)`;
});

//// 3. 赛博数字火花系统
const canvas = document.getElementById('particles-canvas');
const ctx = canvas.getContext('2d');
let particlesArray = [];

function resizeCanvas() {
  canvas.width = window.innerWidth; canvas.height = window.innerHeight;
}
window.addEventListener('resize', resizeCanvas);
resizeCanvas();

class Particle {
  constructor() {
    this.x = Math.random() * canvas.width;
    this.y = canvas.height + Math.random() * 100;
    this.size = Math.random() * 2 + 0.5;
    this.speedY = Math.random() * 2 + 0.5;
    this.speedX = (Math.random() - 0.5) * 1;
    this.opacity = Math.random() * 0.5 + 0.3;
  }
  update() {
    this.y -= this.speedY; this.x += this.speedX;
    if (this.y < 0) { this.y = canvas.height + 10; this.x = Math.random() * canvas.width; }
  }
  draw() {
    ctx.beginPath(); ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
    ctx.fillStyle = `rgba(255, 0, 60, ${this.opacity})`;
    ctx.shadowBlur = 10; ctx.shadowColor = "#ff003c"; ctx.fill();
  }
}

function initParticles() {
  particlesArray = [];
  let num = Math.floor(window.innerWidth / 20);
  for (let i = 0; i < num; i++) particlesArray.push(new Particle());
}
function animateParticles() {
  ctx.clearRect(0, 0, canvas.width, canvas.height);
  particlesArray.forEach(p => { p.update(); p.draw(); });
  requestAnimationFrame(animateParticles);
}
initParticles(); animateParticles();

// 初始化本地存储的数据库 (使用 LocalStorage 实现访客实时上传保存)
let gunData = [];
const savedData = localStorage.getItem('deltaArmoryData');
if (savedData) {
  gunData = JSON.parse(savedData);
} else {
  gunData = [...defaultGunData];
  localStorage.setItem('deltaArmoryData', JSON.stringify(gunData));
}

//// 5. 渲染与检索逻辑
const grid = document.getElementById('dataGrid');
const searchInput = document.getElementById('searchInput');
const typeFilter = document.getElementById('typeFilter');

function renderCards(data) {
  grid.innerHTML = '';
  // 按照最新上传的排在最前面展示
  const reversedData = [...data].reverse(); 
  
  if(reversedData.length === 0) {
    grid.innerHTML = '<div class="empty-state">⚠ 数据库中未找到匹配的战术蓝图...</div>';
    return;
  }
  
  reversedData.forEach((gun) => {
    const card = document.createElement('div');
    card.className = 'card';
    card.innerHTML = `
      <div class="card-header">
        <span class="gun-name">${gun.name}</span>
        <span class="gun-type">${gun.typeName}</span>
      </div>
      <div class="gun-desc">${gun.desc}</div>
      <div class="code-box">
        <div class="code-text" title="${gun.code}">${gun.code}</div>
        <button class="copy-btn" onclick="copyCode(this, '${gun.code}')">COPY</button>
      </div>
    `;
    grid.appendChild(card);
  });
}

function filterData() {
  const keyword = searchInput.value.toLowerCase();
  const type = typeFilter.value;
  
  const filtered = gunData.filter(gun => {
    const matchKeyword = gun.name.toLowerCase().includes(keyword) || gun.desc.toLowerCase().includes(keyword) || gun.typeName.includes(keyword);
    const matchType = type === 'ALL' || gun.type === type;
    return matchKeyword && matchType;
  });
  
  renderCards(filtered);
}

searchInput.addEventListener('input', filterData);
typeFilter.addEventListener('change', filterData);

// 复制改枪码功能
window.copyCode = function(btnElement, code) {
  const tempInput = document.createElement("input");
  tempInput.value = code;
  document.body.appendChild(tempInput);
  tempInput.select();
  document.execCommand("copy");
  document.body.removeChild(tempInput);
  
  const originalText = btnElement.innerText;
  btnElement.innerText = "COPIED!";
  btnElement.classList.add("copied");
  
  setTimeout(() => {
    btnElement.innerText = originalText;
    btnElement.classList.remove("copied");
  }, 2000);
};

//// 6. 模态框与访客提交逻辑
const modalOverlay = document.getElementById('modalOverlay');
const openModalBtn = document.getElementById('openModalBtn');
const closeModalBtn = document.getElementById('closeModalBtn');
const submitCodeBtn = document.getElementById('submitCodeBtn');

openModalBtn.addEventListener('click', () => {
  modalOverlay.classList.add('active');
});

closeModalBtn.addEventListener('click', () => {
  modalOverlay.classList.remove('active');
});

// 点击黑色半透明背景也能关闭表单
modalOverlay.addEventListener('click', (e) => {
  if (e.target === modalOverlay) modalOverlay.classList.remove('active');
});

submitCodeBtn.addEventListener('click', () => {
  const name = document.getElementById('formName').value.trim();
  const typeValue = document.getElementById('formType').value;
  const desc = document.getElementById('formDesc').value.trim();
  const code = document.getElementById('formCode').value.trim();
  
  if (!name || !desc || !code) {
    alert("系统警告：请填写完整的蓝图信息！");
    return;
  }

  // 获取中文类型名称
  const typeNames = { "AR":"突击步枪", "SMG":"冲锋枪", "SR":"狙击步枪", "LMG":"轻机枪", "SG":"霰弹枪" };
  
  const newData = {
    name: name,
    type: typeValue,
    typeName: typeNames[typeValue],
    desc: desc,
    code: code
  };

  // 添加到数据库并保存到 LocalStorage
  gunData.push(newData);
  localStorage.setItem('deltaArmoryData', JSON.stringify(gunData));
  
  // 重新渲染、清空表单并关闭弹窗
  filterData();
  document.getElementById('formName').value = '';
  document.getElementById('formDesc').value = '';
  document.getElementById('formCode').value = '';
  modalOverlay.classList.remove('active');
});

// 初始渲染
renderCards(gunData);

</script>
