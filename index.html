<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">

<title>Archive</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{
background:#000;
color:white;
font-family:Arial,sans-serif;
overflow-x:hidden;
}

.hero{
height:100vh;
background:url("images.png") center center/cover no-repeat;
position:relative;
display:flex;
justify-content:center;
align-items:center;
}

.hero::before{
content:"";
position:absolute;
inset:0;
background:rgba(0,0,0,.45);
backdrop-filter:blur(2px);
}

.content{
position:relative;
z-index:2;
text-align:center;
}

h1{
font-size:5rem;
letter-spacing:8px;
}

.subtitle{
margin-top:15px;
color:#ccc;
letter-spacing:4px;
}

.enter{
margin-top:40px;
display:inline-block;
padding:12px 40px;
border:1px solid #fff;
cursor:pointer;
transition:.3s;
}

.enter:hover{
background:white;
color:black;
}

.section{
min-height:100vh;
padding:120px 10%;
background:#050505;
border-top:1px solid #222;
}

.archive{
font-size:14px;
color:#888;
letter-spacing:3px;
}

.title{
font-size:3rem;
margin-top:10px;
margin-bottom:30px;
}

.card{
background:#111;
padding:30px;
margin-top:20px;
border:1px solid #222;
transition:.3s;
}

.card:hover{
transform:translateY(-5px);
border-color:#666;
}

</style>
</head>

<body>

<section class="hero">

<div class="content">

<h1>ARCHIVE</h1>

<div class="subtitle">
ACCESS GRANTED
</div>

<div class="enter"
onclick="window.scrollTo({
top:window.innerHeight,
behavior:'smooth'
})">
ENTER
</div>

</div>

</section>

<section class="section">

<div class="archive">
ARCHIVE 01
</div>

<div class="title">
关于我
</div>

<div class="card">
这里写你的介绍
</div>

</section>

<section class="section">

<div class="archive">
ARCHIVE 02
</div>

<div class="title">
项目
</div>

<div class="card">
项目展示区域
</div>

</section>

<section class="section">

<div class="archive">
ARCHIVE 03
</div>

<div class="title">
工具箱
</div>

<div class="card">
密码生成器 / 待办事项 / AI助手
</div>

</section>

</body>
</html>
