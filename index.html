<style>
:root {
  --neon-red: #ff003c;
  --neon-red-glow: rgba(255, 0, 60, 0.6);
  --neon-cyan: #00f3ff;
  --neon-cyan-glow: rgba(0, 243, 255, 0.6);
  --dark-glass: rgba(10, 10, 10, 0.65);
  --panel-border: rgba(255, 0, 60, 0.3);
}

* { margin: 0; padding: 0; box-sizing: border-box; }

body {
  font-family: 'Orbitron', "Microsoft YaHei", sans-serif;
  overflow: hidden; background: #050505; color: white;
}

.hero { height: 100vh; width: 100%; position: relative; overflow: hidden; }

.hero-bg {
  position: absolute; top: -5%; left: -5%; width: 110%; height: 110%;
  background: url("https://images.unsplash.com/photo-1605806616949-1e87b487cb2a?q=80&w=1920&auto=format&fit=crop");
  background-size: cover; background-position: center; background-repeat: no-repeat;
  transition: transform 0.1s ease-out; z-index: 1;
}

#particles-canvas {
  position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 2; pointer-events: none;
}

.overlay {
  position: absolute; inset: 0; z-index: 3; pointer-events: none;
  background: radial-gradient(
    circle 800px at var(--mouse-x, 50%) var(--mouse-y, 50%),
    rgba(255, 0, 60, 0.1) 0%, rgba(0, 0, 0, 0.7) 40%, rgba(0, 0, 0, 0.95) 100%
  );
}

.main-container {
  position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
  width: 95%; max-width: 1400px; height: 88vh; z-index: 10;
  display: flex; flex-direction: column;
  animation: contentFadeIn 1s cubic-bezier(0.2, 0.8, 0.2, 1) forwards;
}

@keyframes contentFadeIn {
  from { opacity: 0; transform: translate(-50%, -48%); }
  to { opacity: 1; transform: translate(-50%, -50%); }
}

.header-bar {
  display: flex; justify-content: space-between; align-items: flex-end;
  margin-bottom: 20px; padding: 0 10px;
}

.title-box .title {
  font-size: 36px; font-weight: 900; letter-spacing: 3px;
  text-shadow: 0 0 10px var(--neon-red), 0 0 20px var(--neon-red);
}
.title-box .subtitle {
  font-size: 14px; color: #aaa; letter-spacing: 4px; margin-top: 5px;
}
.clock {
  font-size: 24px; font-weight: 700; color: var(--neon-cyan);
  text-shadow: 0 0 15px var(--neon-cyan-glow);
}

.control-panel {
  display: flex; gap: 15px; margin-bottom: 20px;
  background: var(--dark-glass); padding: 15px; border-radius: 8px;
  border: 1px solid var(--panel-border); backdrop-filter: blur(10px);
  box-shadow: 0 0 20px rgba(0,0,0,0.5); flex-wrap: wrap;
}

.input-field {
  flex: 1; min-width: 150px; background: rgba(255,255,255,0.05);
  border: 1px solid rgba(255,0,60,0.5); color: white;
  padding: 12px 20px; font-size: 14px; font-family: inherit;
  border-radius: 4px; outline: none; transition: all 0.3s;
}

.input-field:focus { border-color: var(--neon-red); box-shadow: 0 0 10px var(--neon-red-glow); background: rgba(255,0,60,0.1); }
select.input-field { flex: none; width: 160px; cursor: pointer; }
select.input-field option { background: #111; color: white; }

.btn-primary {
  background: rgba(255,0,60,0.2); color: white; border: 1px solid var(--neon-red);
  padding: 0 20px; font-size: 14px; font-weight: bold; cursor: pointer;
  border-radius: 4px; transition: 0.3s; text-transform: uppercase; letter-spacing: 1px;
}
.btn-primary:hover { background: var(--neon-red); box-shadow: 0 0 15px var(--neon-red-glow); transform: translateY(-2px); }

/* 数据嗅探按钮特殊样式 */
.btn-sync {
  background: rgba(0, 243, 255, 0.1); border-color: var(--neon-cyan); color: var(--neon-cyan);
}
.btn-sync:hover { background: var(--neon-cyan); color: black; box-shadow: 0 0 15px var(--neon-cyan-glow); }
.btn-sync.loading {
  animation: pulseCyan 1s infinite; pointer-events: none; opacity: 0.8;
}
@keyframes pulseCyan {
  0% { box-shadow: 0 0 5px var(--neon-cyan-glow); }
  50% { box-shadow: 0 0 25px var(--neon-cyan-glow); background: rgba(0, 243, 255, 0.3); }
  100% { box-shadow: 0 0 5px var(--neon-cyan-glow); }
}

.data-grid {
  flex: 1; overflow-y: auto; display: grid;
  grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 15px; padding-right: 10px;
}
.data-grid::-webkit-scrollbar { width: 8px; }
.data-grid::-webkit-scrollbar-track { background: rgba(255,255,255,0.05); border-radius: 4px; }
.data-grid::-webkit-scrollbar-thumb { background: var(--neon-red); border-radius: 4px; }

.card {
  background: var(--dark-glass); border: 1px solid var(--panel-border);
  border-radius: 8px; padding: 15px; backdrop-filter: blur(5px);
  transition: transform 0.3s, box-shadow 0.3s, border-color 0.3s;
  display: flex; flex-direction: column; position: relative; overflow: hidden;
  cursor: pointer;

.card.new-data {
  border-color: var(--neon-cyan); box-shadow: 0 0 20px var(--neon-cyan-glow);

@keyframes highlightNew {
  0% { background: rgba(0, 243, 255, 0.2); }

.card:hover { transform: translateY(-5px); border-color: var(--neon-red); box-shadow: 0 5px 20px var(--neon-red-glow); }
.card::before {
  content: ''; position: absolute; top: 0; left: -100%; width: 50%; height: 100%;
  background: linear-gradient(to right, transparent, rgba(255,255,255,0.1), transparent);
  transform: skewX(-25deg); transition: 0.5s; pointer-events: none;

.card:hover::before { left: 150%; }

.card-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; }

.code-box { display: flex; background: rgba(0,0,0,0.8); border: 1px solid #333; border-radius: 4px; overflow: hidden; width: 100%; }
.code-text { flex: 1; min-width: 0; padding: 10px; font-family: monospace; font-size: 12px; color: #0f0; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; line-height: 18px; }
.copy-btn { background: rgba(255,0,60,0.2); color: white; border: none; padding: 0 12px; cursor: pointer; font-weight: bold; font-family: inherit; transition: 0.3s; border-left: 1px solid var(--neon-red); flex-shrink: 0; font-size: 12px;}

.empty-state { grid-column: 1 / -1; text-align: center; padding: 50px; color: #666; font-size: 18px; }

@media (max-width: 768px) {

.modal-overlay {

.modal-overlay.active { opacity: 1; pointer-events: all; }

.form-group { margin-bottom: 15px; }

.form-group input, .form-group select, .form-group textarea { width: 100%; }

.submit-btn { width: 100%; margin-top: 10px; padding: 15px; font-size: 16px;}

/* 赛博风消息通知 (Toast) */
.toast-container {

.toast {

</style>
</head>

// --- 消息系统 (Toast) ---
function showToast(message, type = 'default', duration = 3000) {
  const container = document.getElementById('toastContainer');
  const toast = document.createElement('div');
  toast.className = `toast ${type}`;
  toast.innerText = message;
  container.appendChild(toast);
  
  setTimeout(() => toast.classList.add('show'), 10);
  setTimeout(() => {
    toast.classList.remove('show');
    setTimeout(() => toast.remove(), 300);
  }, duration);
}

// --- 实时时钟 ---
function updateClock(){
  const now = new Date();
  const h = String(now.getHours()).padStart(2, '0');
  const m = String(now.getMinutes()).padStart(2, '0');
  const s = String(now.getSeconds()).padStart(2, '0');
  document.getElementById("clock").innerHTML = `[ ${h}:${m}:${s} ]`;
}
setInterval(updateClock, 1000); updateClock();

});

// --- 粒子特效 ---
const canvas = document.getElementById('particles-canvas');
const ctx = canvas.getContext('2d');
let particlesArray = [];
function resizeCanvas() { canvas.width = window.innerWidth; canvas.height = window.innerHeight; }
window.addEventListener('resize', resizeCanvas); resizeCanvas();

class Particle {
  constructor() {
    this.x = Math.random() * canvas.width; this.y = canvas.height + Math.random() * 100;
    this.size = Math.random() * 2 + 0.5; this.speedY = Math.random() * 1.5 + 0.5;
    this.speedX = (Math.random() - 0.5) * 1; this.opacity = Math.random() * 0.5 + 0.2;
  }
  update() {
    this.y -= this.speedY; this.x += this.speedX;
    if (this.y < 0) { this.y = canvas.height + 10; this.x = Math.random() * canvas.width; }
  }
  draw() {
    ctx.beginPath(); ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
    ctx.fillStyle = `rgba(0, 243, 255, ${this.opacity})`; // 改为青色科幻粒子
    ctx.shadowBlur = 10; ctx.shadowColor = "#00f3ff"; ctx.fill();
  }
}
function initParticles() {
  particlesArray = []; let num = Math.floor(window.innerWidth / 20);
  for (let i = 0; i < num; i++) particlesArray.push(new Particle());
}
function animateParticles() {
  ctx.clearRect(0, 0, canvas.width, canvas.height);
  particlesArray.forEach(p => { p.update(); p.draw(); }); requestAnimationFrame(animateParticles);
}
initParticles(); animateParticles();

let gunData = [];
// 更换 KEY 以强制刷新本地缓存载入真国服数据
const savedData = localStorage.getItem('deltaArmoryDataCN_Real_v1');
if (savedData) {
  gunData = JSON.parse(savedData);
} else {
  gunData = [...defaultGunData];
  localStorage.setItem('deltaArmoryDataCN_Real_v1', JSON.stringify(gunData));
}

// --- 渲染逻辑与修复点击事件 ---
const grid = document.getElementById('dataGrid');
const searchInput = document.getElementById('searchInput');
const typeFilter = document.getElementById('typeFilter');

function renderCards(data) {
  grid.innerHTML = '';
  const reversedData = [...data].reverse(); 
  if(reversedData.length === 0) {
    grid.innerHTML = '<div class="empty-state">⚠ 国服节点未命中...暂无该型号战术蓝图</div>'; return;
  }
  
  reversedData.forEach((gun) => {
    const card = document.createElement('div');
    card.className = gun.isNew ? 'card new-data' : 'card';
    
    card.innerHTML = `
      <div class="card-header">
        <span class="gun-name">${gun.name}</span>
        <span class="gun-type ${gun.isNew ? 'cyan' : ''}">${gun.isNew ? '国内论坛首发 / ' : ''}${gun.typeName}</span>
      </div>
      <div class="gun-desc">${gun.desc}</div>
      <div class="code-box">
        <div class="code-text" title="${gun.code}">${gun.code}</div>
        <button class="copy-btn action-copy">COPY</button>
      </div>
    `;

    // 修复 1：严格为整张卡片绑定点击事件，打开详情
    card.addEventListener('click', () => {
      openDetailModal(gun);
    });

    // 修复 2：为卡片内的 COPY 按钮绑定独立事件，并阻止冒泡防止同时打开详情
    const copyBtn = card.querySelector('.action-copy');
    copyBtn.addEventListener('click', (e) => {
      e.stopPropagation(); // 阻止点击事件向上层卡片传递
      copyCode(copyBtn, gun.code);
    });

    grid.appendChild(card);
    if(gun.isNew) delete gun.isNew; 
  });
}

function filterData() {
  const keyword = searchInput.value.toLowerCase();
  const type = typeFilter.value;
  const filtered = gunData.filter(gun => {
    const matchKeyword = gun.name.toLowerCase().includes(keyword) || gun.desc.toLowerCase().includes(keyword) || gun.typeName.includes(keyword);
    const matchType = type === 'ALL' || gun.type === type;
    return matchKeyword && matchType;
  });
  renderCards(filtered);
}

searchInput.addEventListener('input', filterData);
typeFilter.addEventListener('change', filterData);

window.copyCode = function(btnElement, code) {
  const tempInput = document.createElement("input"); tempInput.value = code;
  document.body.appendChild(tempInput); tempInput.select(); document.execCommand("copy"); document.body.removeChild(tempInput);
  
  const originalText = btnElement.innerText; 
  btnElement.innerText = "COPIED"; 
  btnElement.classList.add("copied");
  
  // 额外弹窗提示
  showToast(`已成功复制国服配置 [${code}] 至剪贴板`, "success");

  setTimeout(() => { btnElement.innerText = originalText; btnElement.classList.remove("copied"); }, 2000);
};

// --- 全网嗅探 (国内社区专属爬虫模拟) ---
const syncBtn = document.getElementById('syncBtn');

// 模拟爬取到的国内最新绝活配装 (格式对齐真国服)
const mockScrapedDataPool = [
  { name: "M14", type: "SR", typeName: "射手步枪", desc: "【嘉豪直播推荐】某幻神大主播昨晚打国服的独家上分M14配装，极稳且准。", code: "M14射手步枪-烽火地带-6JQ68M009E82QJKTPQGJP" },
  { name: "K416", type: "AR", typeName: "突击步枪", desc: "【红点常规】贴吧老哥连夜分享的K416玄学爆头改法，传言弹道有暗改。", code: "K416突击步枪-烽火地带-6JU3L0O09E82QJKTPQGJP" },
  { name: "SR-3M", type: "AR", typeName: "紧凑突击步枪", desc: "【极致性价比】小黑盒当前高分榜首推，极其便宜好用的打野平民跑刀改法。", code: "SR-3M紧凑突击步枪-烽火地带-6JQ6OOK09E82QJKTPQGJP" },
  { name: "QJB201", type: "LMG", typeName: "轻机枪", desc: "【红点老版】经典的QJB201防守方架点配装，已经被国内战队证实好用。", code: "QJB201轻机枪-烽火地带-6JSPEGO09E82QJKTPQGJP" }
];

syncBtn.addEventListener('click', () => {
  if(mockScrapedDataPool.length === 0) {
    showToast("国服嗅探网：当前各大社区暂时没有最新未收录的有效蓝图。", "warning");
    return;
  }
  
  syncBtn.classList.add('loading');
  syncBtn.innerText = "正在连接国服社区爬虫...";
  showToast("SYSTEM: 启动数据嗅探，正在解析 小黑盒 / 贴吧 / B站...", "default");

  setTimeout(() => {
    const scrapeCount = Math.min(Math.floor(Math.random() * 2) + 1, mockScrapedDataPool.length);
    const newItems = [];
    for(let i=0; i<scrapeCount; i++){
      const item = mockScrapedDataPool.shift(); 
      item.isNew = true; 
      newItems.push(item);
      gunData.push(item);
    }
    
    localStorage.setItem('deltaArmoryDataCN_Real_v1', JSON.stringify(gunData));
    
    searchInput.value = '';
    typeFilter.value = 'ALL';
    filterData();

    syncBtn.classList.remove('loading');
    syncBtn.innerText = "⟳ 嗅探国服端游最新 META";
    showToast(`嗅探完成！成功拦截并解析了 ${scrapeCount} 个真国服改枪协议。`, "success");
    
  }, 3000);
});

// --- 上传模态框逻辑 ---
const modalOverlay = document.getElementById('modalOverlay');
const openModalBtn = document.getElementById('openModalBtn');
const closeModalBtn = document.getElementById('closeModalBtn');
const submitCodeBtn = document.getElementById('submitCodeBtn');

openModalBtn.addEventListener('click', () => modalOverlay.classList.add('active'));
closeModalBtn.addEventListener('click', () => modalOverlay.classList.remove('active'));
modalOverlay.addEventListener('click', (e) => { if (e.target === modalOverlay) modalOverlay.classList.remove('active'); });

submitCodeBtn.addEventListener('click', () => {
  const name = document.getElementById('formName').value.trim().toUpperCase();
  const typeValue = document.getElementById('formType').value;
  const desc = document.getElementById('formDesc').value.trim();
  const code = document.getElementById('formCode').value.trim();
  
  if (!name || !desc || !code) { showToast("输入错误：关键改枪协议字段缺失！", "warning"); return; }
  
  const typeNames = { "AR":"突击步枪", "SMG":"冲锋枪", "SR":"射手/狙击步枪", "LMG":"轻/通用机枪", "SG":"霰弹枪" };
  const newData = { name: name, type: typeValue, typeName: typeNames[typeValue], desc: desc, code: code, isNew: true };

  gunData.push(newData);
  localStorage.setItem('deltaArmoryDataCN_Real_v1', JSON.stringify(gunData));
  
  filterData();
  document.getElementById('formName').value = ''; document.getElementById('formDesc').value = ''; document.getElementById('formCode').value = '';
  modalOverlay.classList.remove('active');
  showToast("上传成功：国服专属蓝图已写入本地安全数据库。", "success");
});

// --- 详情模态框逻辑 ---
const detailModal = document.getElementById('detailModal');
const closeDetailBtn = document.getElementById('closeDetailBtn');

function openDetailModal(gun) {
  document.getElementById('detailName').innerText = gun.name;
  document.getElementById('detailType').innerText = gun.typeName;
  document.getElementById('detailDesc').innerText = gun.desc;
  document.getElementById('detailCode').innerText = gun.code;
  
  // 给详情框里的按钮重新绑定正确的事件
  const copyBtn = document.getElementById('detailCopyBtn');
  // 必须用闭包清除之前的旧事件，直接覆盖 onclick 是最稳的
  copyBtn.onclick = function() {
    window.copyCode(this, gun.code);
  };
  
  detailModal.classList.add('active');
}

closeDetailBtn.addEventListener('click', () => detailModal.classList.remove('active'));
detailModal.addEventListener('click', (e) => { if (e.target === detailModal) detailModal.classList.remove('active'); });

// 初始渲染
renderCards(gunData);

</script>
