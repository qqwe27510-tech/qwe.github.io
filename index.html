<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>QWE Archive - Delta Force Armory 2026</title>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&display=swap" rel="stylesheet">

<style>
:root {
  --neon-red: #ff003c;
  --neon-red-glow: rgba(255, 0, 60, 0.6);
  --neon-cyan: #00f3ff;
  --neon-cyan-glow: rgba(0, 243, 255, 0.6);
  --dark-glass: rgba(10, 10, 10, 0.65);
  --panel-border: rgba(255, 0, 60, 0.3);
}

* { margin: 0; padding: 0; box-sizing: border-box; }

body {
  font-family: 'Orbitron', "Microsoft YaHei", sans-serif;
  overflow: hidden; background: #050505; color: white;
}

.hero { height: 100vh; width: 100%; position: relative; overflow: hidden; }

.hero-bg {
  position: absolute; top: -5%; left: -5%; width: 110%; height: 110%;
  background: url("https://images.unsplash.com/photo-1605806616949-1e87b487cb2a?q=80&w=1920&auto=format&fit=crop");
  background-size: cover; background-position: center; background-repeat: no-repeat;
  transition: transform 0.1s ease-out; z-index: 1;
}

#particles-canvas {
  position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 2; pointer-events: none;
}

.overlay {
  position: absolute; inset: 0; z-index: 3; pointer-events: none;
  background: radial-gradient(
    circle 800px at var(--mouse-x, 50%) var(--mouse-y, 50%),
    rgba(255, 0, 60, 0.1) 0%, rgba(0, 0, 0, 0.7) 40%, rgba(0, 0, 0, 0.95) 100%
  );
}

.main-container {
  position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
  width: 95%; max-width: 1400px; height: 88vh; z-index: 10;
  display: flex; flex-direction: column;
  animation: contentFadeIn 1s cubic-bezier(0.2, 0.8, 0.2, 1) forwards;
}

@keyframes contentFadeIn {
  from { opacity: 0; transform: translate(-50%, -48%); }
  to { opacity: 1; transform: translate(-50%, -50%); }
}

.header-bar {
  display: flex; justify-content: space-between; align-items: flex-end;
  margin-bottom: 20px; padding: 0 10px;
}

.title-box .title {
  font-size: 36px; font-weight: 900; letter-spacing: 3px;
  text-shadow: 0 0 10px var(--neon-red), 0 0 20px var(--neon-red);
}
.title-box .subtitle {
  font-size: 14px; color: #aaa; letter-spacing: 4px; margin-top: 5px;
}
.clock {
  font-size: 24px; font-weight: 700; color: var(--neon-cyan);
  text-shadow: 0 0 15px var(--neon-cyan-glow);
}

.control-panel {
  display: flex; gap: 15px; margin-bottom: 20px;
  background: var(--dark-glass); padding: 15px; border-radius: 8px;
  border: 1px solid var(--panel-border); backdrop-filter: blur(10px);
  box-shadow: 0 0 20px rgba(0,0,0,0.5); flex-wrap: wrap;
}

.input-field {
  flex: 1; min-width: 150px; background: rgba(255,255,255,0.05);
  border: 1px solid rgba(255,0,60,0.5); color: white;
  padding: 12px 20px; font-size: 14px; font-family: inherit;
  border-radius: 4px; outline: none; transition: all 0.3s;
}

.input-field:focus { border-color: var(--neon-red); box-shadow: 0 0 10px var(--neon-red-glow); background: rgba(255,0,60,0.1); }
select.input-field { flex: none; width: 160px; cursor: pointer; }
select.input-field option { background: #111; color: white; }

.btn-primary {
  background: rgba(255,0,60,0.2); color: white; border: 1px solid var(--neon-red);
  padding: 0 20px; font-size: 14px; font-weight: bold; cursor: pointer;
  border-radius: 4px; transition: 0.3s; text-transform: uppercase; letter-spacing: 1px;
}
.btn-primary:hover { background: var(--neon-red); box-shadow: 0 0 15px var(--neon-red-glow); transform: translateY(-2px); }

/* 数据嗅探按钮特殊样式 */
.btn-sync {
  background: rgba(0, 243, 255, 0.1); border-color: var(--neon-cyan); color: var(--neon-cyan);
}
.btn-sync:hover { background: var(--neon-cyan); color: black; box-shadow: 0 0 15px var(--neon-cyan-glow); }
.btn-sync.loading {
  animation: pulseCyan 1s infinite; pointer-events: none; opacity: 0.8;
}
@keyframes pulseCyan {
  0% { box-shadow: 0 0 5px var(--neon-cyan-glow); }
  50% { box-shadow: 0 0 25px var(--neon-cyan-glow); background: rgba(0, 243, 255, 0.3); }
  100% { box-shadow: 0 0 5px var(--neon-cyan-glow); }
}

.data-grid {
  flex: 1; overflow-y: auto; display: grid;
  grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 15px; padding-right: 10px;
}
.data-grid::-webkit-scrollbar { width: 8px; }
.data-grid::-webkit-scrollbar-track { background: rgba(255,255,255,0.05); border-radius: 4px; }
.data-grid::-webkit-scrollbar-thumb { background: var(--neon-red); border-radius: 4px; }

.card {
  background: var(--dark-glass); border: 1px solid var(--panel-border);
  border-radius: 8px; padding: 15px; backdrop-filter: blur(5px);
  transition: transform 0.3s, box-shadow 0.3s, border-color 0.3s;
  display: flex; flex-direction: column; position: relative; overflow: hidden;
}
.card.new-data {
  border-color: var(--neon-cyan); box-shadow: 0 0 20px var(--neon-cyan-glow);
  animation: highlightNew 2s forwards;
}
@keyframes highlightNew {
  0% { background: rgba(0, 243, 255, 0.2); }
  100% { background: var(--dark-glass); }
}

.card:hover { transform: translateY(-5px); border-color: var(--neon-red); box-shadow: 0 5px 20px var(--neon-red-glow); }
.card::before {
  content: ''; position: absolute; top: 0; left: -100%; width: 50%; height: 100%;
  background: linear-gradient(to right, transparent, rgba(255,255,255,0.1), transparent);
  transform: skewX(-25deg); transition: 0.5s; pointer-events: none;
}
.card:hover::before { left: 150%; }

.card-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; }
.gun-name { font-size: 20px; font-weight: 700; color: white; text-shadow: 0 0 5px rgba(255,255,255,0.5); }
.gun-type { font-size: 12px; padding: 3px 6px; background: rgba(255,0,60,0.2); border: 1px solid var(--neon-red); border-radius: 4px; color: var(--neon-red); }
.gun-type.cyan { background: rgba(0, 243, 255, 0.2); border-color: var(--neon-cyan); color: var(--neon-cyan); }

.gun-desc { 
  font-size: 13px; color: #aaa; margin-bottom: 15px; flex: 1; line-height: 1.5; 
  font-family: "Microsoft YaHei", sans-serif; word-wrap: break-word; word-break: break-all;
}

.code-box { display: flex; background: rgba(0,0,0,0.8); border: 1px solid #333; border-radius: 4px; overflow: hidden; width: 100%; }
.code-text { flex: 1; min-width: 0; padding: 10px; font-family: monospace; font-size: 12px; color: #0f0; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; line-height: 18px; }
.copy-btn { background: rgba(255,0,60,0.2); color: white; border: none; padding: 0 12px; cursor: pointer; font-weight: bold; font-family: inherit; transition: 0.3s; border-left: 1px solid var(--neon-red); flex-shrink: 0; font-size: 12px;}
.copy-btn:hover { background: var(--neon-red); }
.copy-btn.copied { background: #0f0; color: black; border-left-color: #0f0; }

.empty-state { grid-column: 1 / -1; text-align: center; padding: 50px; color: #666; font-size: 18px; }

@media (max-width: 768px) {
  .header-bar { flex-direction: column; align-items: flex-start; gap: 10px; }
  .title-box .title { font-size: 24px; }
  .data-grid { grid-template-columns: repeat(auto-fill, minmax(100%, 1fr)); }
  .main-container { width: 95%; height: 95vh;}
}

/* 模态框样式 */
.modal-overlay {
  position: fixed; top: 0; left: 0; width: 100%; height: 100%;
  background: rgba(0, 0, 0, 0.85); backdrop-filter: blur(10px); z-index: 100;
  display: flex; justify-content: center; align-items: center;
  opacity: 0; pointer-events: none; transition: 0.3s;
}
.modal-overlay.active { opacity: 1; pointer-events: all; }
.modal-box {
  background: #0a0a0a; border: 1px solid var(--neon-red); box-shadow: 0 0 30px rgba(255, 0, 60, 0.3);
  width: 90%; max-width: 500px; padding: 30px; border-radius: 8px; transform: translateY(-20px); transition: 0.3s; position: relative;
}
.modal-overlay.active .modal-box { transform: translateY(0); }
.modal-header { font-size: 24px; font-weight: 700; color: var(--neon-red); margin-bottom: 20px; text-shadow: 0 0 10px var(--neon-red-glow); }
.close-modal { position: absolute; top: 20px; right: 20px; background: none; border: none; color: white; font-size: 24px; cursor: pointer; transition: 0.2s; }
.close-modal:hover { color: var(--neon-red); }
.form-group { margin-bottom: 15px; }
.form-group label { display: block; margin-bottom: 5px; font-size: 14px; color: #aaa; }
.form-group input, .form-group select, .form-group textarea { width: 100%; }
.form-group textarea { resize: vertical; min-height: 80px; }
.submit-btn { width: 100%; margin-top: 10px; padding: 15px; font-size: 16px;}

/* 赛博风消息通知 (Toast) */
.toast-container {
  position: fixed; top: 20px; right: 20px; z-index: 999;
  display: flex; flex-direction: column; gap: 10px; pointer-events: none;
}
.toast {
  background: rgba(10, 10, 10, 0.9); border-left: 4px solid var(--neon-cyan);
  color: white; padding: 15px 20px; border-radius: 4px; box-shadow: 0 0 15px rgba(0,0,0,0.5);
  font-family: "Microsoft YaHei", sans-serif; font-size: 14px;
  transform: translateX(120%); transition: transform 0.3s cubic-bezier(0.2, 0.8, 0.2, 1);
}
.toast.show { transform: translateX(0); }
.toast.success { border-color: #0f0; text-shadow: 0 0 5px rgba(0,255,0,0.5); }
.toast.warning { border-color: var(--neon-red); text-shadow: 0 0 5px rgba(255,0,60,0.5); }
</style>
</head>

<script>
// --- 消息系统 (Toast) ---
function showToast(message, type = 'default', duration = 3000) {
  const container = document.getElementById('toastContainer');
  const toast = document.createElement('div');
  toast.className = `toast ${type}`;
  toast.innerText = message;
  container.appendChild(toast);
  
  setTimeout(() => toast.classList.add('show'), 10);
  setTimeout(() => {
    toast.classList.remove('show');
    setTimeout(() => toast.remove(), 300);
  }, duration);
}

// --- 实时时钟 ---
function updateClock(){
  const now = new Date();
  const h = String(now.getHours()).padStart(2, '0');
  const m = String(now.getMinutes()).padStart(2, '0');
  const s = String(now.getSeconds()).padStart(2, '0');
  document.getElementById("clock").innerHTML = `[ ${h}:${m}:${s} ]`;
}
setInterval(updateClock, 1000); updateClock();

// --- 鼠标视差 ---
const heroBg = document.getElementById('hero-bg');
const overlay = document.getElementById('overlay');
document.addEventListener('mousemove', (e) => {
  const x = e.clientX, y = e.clientY;
  overlay.style.setProperty('--mouse-x', `${x}px`); overlay.style.setProperty('--mouse-y', `${y}px`);
  heroBg.style.transform = `translate(${(x - window.innerWidth/2)/60}px, ${(y - window.innerHeight/2)/60}px)`;
});

// --- 粒子特效 ---
const canvas = document.getElementById('particles-canvas');
const ctx = canvas.getContext('2d');
let particlesArray = [];
function resizeCanvas() { canvas.width = window.innerWidth; canvas.height = window.innerHeight; }
window.addEventListener('resize', resizeCanvas); resizeCanvas();

class Particle {
  constructor() {
    this.x = Math.random() * canvas.width; this.y = canvas.height + Math.random() * 100;
    this.size = Math.random() * 2 + 0.5; this.speedY = Math.random() * 1.5 + 0.5;
    this.speedX = (Math.random() - 0.5) * 1; this.opacity = Math.random() * 0.5 + 0.2;
  }
  update() {
    this.y -= this.speedY; this.x += this.speedX;
    if (this.y < 0) { this.y = canvas.height + 10; this.x = Math.random() * canvas.width; }
  }
  draw() {
    ctx.beginPath(); ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
    ctx.fillStyle = `rgba(0, 243, 255, ${this.opacity})`; // 改为青色科幻粒子
    ctx.shadowBlur = 10; ctx.shadowColor = "#00f3ff"; ctx.fill();
  }
}
function initParticles() {
  particlesArray = []; let num = Math.floor(window.innerWidth / 20);
  for (let i = 0; i < num; i++) particlesArray.push(new Particle());
}
function animateParticles() {
  ctx.clearRect(0, 0, canvas.width, canvas.height);
  particlesArray.forEach(p => { p.update(); p.draw(); }); requestAnimationFrame(animateParticles);
}
initParticles(); animateParticles();

  { name: "SR-25", type: "SR", typeName: "狙击步枪", desc: "【近战特化DMR】换装全息或红点，把它当作单发伤害爆炸的突击步枪打。", code: "Delta-SR25-Cqb04" },
  { name: "SR-25", type: "SR", typeName: "狙击步枪", desc: "【极致消音】全开火隐蔽，开火声音极小，适合打野玩家远程抽靶。", code: "Delta-SR25-Sil05" },
  
  // S12K
  { name: "S12K", type: "SG", typeName: "霰弹枪", desc: "【20发拆迁】骇人听闻的20发弹鼓连喷，攻楼神器，按住左键不松手能清空一栋楼。", code: "Delta-S12K-20R01" },
  { name: "S12K", type: "SG", typeName: "霰弹枪", desc: "【独头弹重狙】装配独头弹加高倍镜，一发入魂，把霰弹枪玩成重型狙击枪。", code: "Delta-S12K-Slg02" },
  { name: "S12K", type: "SG", typeName: "霰弹枪", desc: "【极致连发】改装自动机加快射击间隔，遇到人瞬间把子弹全倾泻出去。", code: "Delta-S12K-Auto03" },
  { name: "S12K", type: "SG", typeName: "霰弹枪", desc: "【重装防守】满改后坐力控制，卡在楼梯口一夫当关，谁冲谁死。", code: "Delta-S12K-Hvy04" },
  { name: "S12K", type: "SG", typeName: "霰弹枪", desc: "【游击跑轰】机动性最强改装，打一枪换一个掩体，专门溜重装步兵。", code: "Delta-S12K-Hit05" }
];

let gunData = [];
const savedData = localStorage.getItem('deltaArmoryData2026');
if (savedData) {
  gunData = JSON.parse(savedData);
} else {
  gunData = [...defaultGunData];
  localStorage.setItem('deltaArmoryData2026', JSON.stringify(gunData));
}

// --- 渲染逻辑 ---
const grid = document.getElementById('dataGrid');
const searchInput = document.getElementById('searchInput');
const typeFilter = document.getElementById('typeFilter');

function renderCards(data) {
  grid.innerHTML = '';
  const reversedData = [...data].reverse(); 
  if(reversedData.length === 0) {
    grid.innerHTML = '<div class="empty-state">⚠ 节点未命中...暂无该型号战术蓝图</div>'; return;
  }
  
  reversedData.forEach((gun) => {
    const card = document.createElement('div');
    // 如果是刚刚爬取下来的新数据，给一个高亮 class
    card.className = gun.isNew ? 'card new-data' : 'card';
    card.innerHTML = `
      <div class="card-header">
        <span class="gun-name">${gun.name}</span>
        <span class="gun-type ${gun.isNew ? 'cyan' : ''}">${gun.isNew ? '最新抓取 / ' : ''}${gun.typeName}</span>
      </div>
      <div class="gun-desc">${gun.desc}</div>
      <div class="code-box">
        <div class="code-text" title="${gun.code}">${gun.code}</div>
        <button class="copy-btn" onclick="copyCode(this, '${gun.code}')">COPY</button>
      </div>
    `;
    grid.appendChild(card);
    // 渲染完移除标记，防止下次渲染一直闪
    if(gun.isNew) delete gun.isNew; 
  });
}

function filterData() {
  const keyword = searchInput.value.toLowerCase();
  const type = typeFilter.value;
  const filtered = gunData.filter(gun => {
    const matchKeyword = gun.name.toLowerCase().includes(keyword) || gun.desc.toLowerCase().includes(keyword) || gun.typeName.includes(keyword);
    const matchType = type === 'ALL' || gun.type === type;
    return matchKeyword && matchType;
  });
  renderCards(filtered);
}

searchInput.addEventListener('input', filterData);
typeFilter.addEventListener('change', filterData);

window.copyCode = function(btnElement, code) {
  const tempInput = document.createElement("input"); tempInput.value = code;
  document.body.appendChild(tempInput); tempInput.select(); document.execCommand("copy"); document.body.removeChild(tempInput);
  const originalText = btnElement.innerText; btnElement.innerText = "COPIED"; btnElement.classList.add("copied");
  setTimeout(() => { btnElement.innerText = originalText; btnElement.classList.remove("copied"); }, 2000);
};

// --- 全网嗅探 (爬虫模拟逻辑) ---
// 由于纯前端无法真的跨域爬虫，我们用这套系统模拟演示连接后端爬虫的逻辑
const syncBtn = document.getElementById('syncBtn');

// 模拟爬虫抓取到的 2026 下半年绝活配装池
const mockScrapedDataPool = [
  { name: "P90", type: "SMG", typeName: "冲锋枪", desc: "【B站百万播放】某职业选手公开的最强P90身法流，专克各种老六。", code: "Delta-NET-P90X" },
  { name: "AK-12", type: "AR", typeName: "突击步枪", desc: "【贴吧神秘代码】论坛狂推的AK12玄学爆头改法，传言隐藏后座力最低。", code: "Delta-NET-AK12H" },
  { name: "AWM", type: "SR", typeName: "狙击步枪", desc: "【某鱼主播同款】瞬狙之王，完全放弃掩护，纯靠反应秒杀的激进改法。", code: "Delta-NET-AWM99" },
  { name: "AUG", type: "AR", typeName: "突击步枪", desc: "【外网搬运】Reddit 玩家开发的 AUG 无脑腰射流，被外服玩家称为毒瘤。", code: "Delta-NET-AUGTX" }
];

syncBtn.addEventListener('click', () => {
  if(mockScrapedDataPool.length === 0) {
    showToast("云端爬虫：当前全网已无最新未收录蓝图。", "warning");
    return;
  }
  
  syncBtn.classList.add('loading');
  syncBtn.innerText = "正在嗅探各大社区论坛...";
  showToast("SYSTEM: 启动爬虫脚本，正在解析 Bilibili / Tieba 数据...", "default");

  // 模拟网络请求和爬虫解析延迟 (3秒)
  setTimeout(() => {
    // 每次随机"爬取"出 1-2 条最新数据
    const scrapeCount = Math.min(Math.floor(Math.random() * 2) + 1, mockScrapedDataPool.length);
    const newItems = [];
    for(let i=0; i<scrapeCount; i++){
      const item = mockScrapedDataPool.shift(); // 从池子里拿出来
      item.isNew = true; // 标记为新数据，触发高亮光效
      newItems.push(item);
      gunData.push(item);
    }
    
    // 保存并渲染
    localStorage.setItem('deltaArmoryData2026', JSON.stringify(gunData));
    
    // 强制重置搜索栏，确保能看到新数据
    searchInput.value = '';
    typeFilter.value = 'ALL';
    filterData();

    // 恢复UI
    syncBtn.classList.remove('loading');
    syncBtn.innerText = "⟳ 全网嗅探 2026 META";
    showToast(`嗅探完成！成功拦截并解析了 ${scrapeCount} 个最新热门改枪码。`, "success");
    
  }, 3000);
});

// --- 模态框逻辑 ---
const modalOverlay = document.getElementById('modalOverlay');
const openModalBtn = document.getElementById('openModalBtn');
const closeModalBtn = document.getElementById('closeModalBtn');
const submitCodeBtn = document.getElementById('submitCodeBtn');

openModalBtn.addEventListener('click', () => modalOverlay.classList.add('active'));
closeModalBtn.addEventListener('click', () => modalOverlay.classList.remove('active'));
modalOverlay.addEventListener('click', (e) => { if (e.target === modalOverlay) modalOverlay.classList.remove('active'); });

submitCodeBtn.addEventListener('click', () => {
  const name = document.getElementById('formName').value.trim().toUpperCase();
  const typeValue = document.getElementById('formType').value;
  const desc = document.getElementById('formDesc').value.trim();
  const code = document.getElementById('formCode').value.trim();
  
  if (!name || !desc || !code) { showToast("输入错误：关键协议字段缺失！", "warning"); return; }
  
  const typeNames = { "AR":"突击步枪", "SMG":"冲锋枪", "SR":"狙击步枪", "LMG":"轻机枪", "SG":"霰弹枪" };
  const newData = { name: name, type: typeValue, typeName: typeNames[typeValue], desc: desc, code: code, isNew: true };

  gunData.push(newData);
  localStorage.setItem('deltaArmoryData2026', JSON.stringify(gunData));
  
  filterData();
  document.getElementById('formName').value = ''; document.getElementById('formDesc').value = ''; document.getElementById('formCode').value = '';
  modalOverlay.classList.remove('active');
  showToast("上传成功：蓝图已成功写入本地安全数据库。", "success");
});

// 初始渲染
renderCards(gunData);

</script>
