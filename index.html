<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>QWE Archive</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
}

html{
scroll-behavior:smooth;
}

body{
background:#000;
color:white;
font-family:Arial, sans-serif;
overflow-x:hidden;
}

/* 首页背景 */

.hero{
height:100vh;
background:
linear-gradient(
rgba(0,0,0,.55),
rgba(0,0,0,.75)
),
url("image.png");

background-size:cover;
background-position:center;
display:flex;
justify-content:center;
align-items:center;
text-align:center;
position:relative;
}

/* 内容 */

.hero-content{
animation:fadeIn 2s ease;
}

.hero h1{
font-size:80px;
letter-spacing:10px;
text-shadow:0 0 20px rgba(255,0,0,.5);
}

.hero p{
margin-top:15px;
color:#ccc;
letter-spacing:4px;
}

.enter-btn{
display:inline-block;
margin-top:40px;
padding:15px 45px;
border:1px solid white;
text-decoration:none;
color:white;
transition:.3s;
}

.enter-btn:hover{
background:white;
color:black;
}

/* 分区 */

.section{
min-height:100vh;
padding:100px 10%;
background:#050505;
border-top:1px solid #222;
}

.archive{
color:#888;
letter-spacing:3px;
font-size:14px;
}

.title{
font-size:50px;
margin-top:10px;
margin-bottom:40px;
}

.card{
background:rgba(255,255,255,.05);
backdrop-filter:blur(10px);
padding:30px;
margin-bottom:25px;
border:1px solid rgba(255,255,255,.1);
transition:.3s;
}

.card:hover{
transform:translateY(-8px);
border-color:red;
}

/* 时间 */

.clock{
position:fixed;
top:20px;
right:20px;
background:rgba(0,0,0,.6);
padding:10px 15px;
border:1px solid #333;
backdrop-filter:blur(10px);
z-index:999;
}

/* 红色光点 */

.cursor{
position:fixed;
width:20px;
height:20px;
background:red;
border-radius:50%;
pointer-events:none;
filter:blur(10px);
opacity:.7;
z-index:9999;
transform:translate(-50%,-50%);
}

@keyframes fadeIn{
from{
opacity:0;
transform:translateY(30px);
}
to{
opacity:1;
transform:translateY(0);
}
}

</style>
</head>

<body>

<div class="clock" id="clock"></div>

<div class="cursor" id="cursor"></div>

<section class="hero">

<div class="hero-content">

<h1>ARCHIVE</h1>

<p>ACCESS GRANTED</p>

<a href="#about" class="enter-btn">
ENTER
</a>

</div>

</section>

<section class="section" id="about">

<div class="archive">
ARCHIVE 01
</div>

<div class="title">
关于我
</div>

<div class="card">
这里填写你的个人介绍
</div>

</section>

<section class="section">

<div class="archive">
ARCHIVE 02
</div>

<div class="title">
项目
</div>

<div class="card">
项目展示区域
</div>

<div class="card">
GitHub 项目
</div>

</section>

<section class="section">

<div class="archive">
ARCHIVE 03
</div>

<div class="title">
工具箱
</div>

<div class="card">
密码生成器
</div>

<div class="card">
待办事项
</div>

<div class="card">
AI助手入口
</div>

</section>

<script>

/* 时间 */

function updateClock(){
const now=new Date();

document.getElementById("clock").innerHTML=
now.toLocaleString();
}

setInterval(updateClock,1000);

updateClock();

/* 鼠标光点 */

const cursor=document.getElementById("cursor");

document.addEventListener("mousemove",(e)=>{
cursor.style.left=e.clientX+"px";
cursor.style.top=e.clientY+"px";
});

</script>

</body>
</html>
