<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>QWE Archive</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{
font-family:"Microsoft YaHei",sans-serif;
overflow:hidden;
background:black;
color:white;
}

/* 背景 */

.hero{
height:100vh;
width:100%;
position:relative;

background:
linear-gradient(
rgba(0,0,0,0.55),
rgba(0,0,0,0.75)
),
url("image.png");

background-size:cover;
background-position:center;
background-repeat:no-repeat;
}

/* 黑色渐变 */

.overlay{
position:absolute;
inset:0;

background:
radial-gradient(
circle at center,
transparent 0%,
rgba(0,0,0,0.35) 60%,
rgba(0,0,0,0.85) 100%
);
}

/* 内容 */

.content{
position:absolute;
top:50%;
left:50%;
transform:translate(-50%,-50%);
text-align:center;
z-index:10;
}

/* 标题 */

.title{
font-size:80px;
font-weight:900;

text-shadow:
0 0 10px #ff003c,
0 0 20px #ff003c,
0 0 40px #ff003c,
0 0 80px #ff003c;

animation:glow 2s infinite alternate;
}

@keyframes glow{

from{
text-shadow:
0 0 10px #ff003c,
0 0 20px #ff003c;
}

to{
text-shadow:
0 0 20px #ff003c,
0 0 40px #ff003c,
0 0 80px #ff003c;
}

}

/* 副标题 */

.subtitle{
margin-top:20px;
font-size:22px;
color:#ddd;
letter-spacing:3px;
}

/* 时间 */

.clock{
margin-top:30px;
font-size:30px;
font-weight:bold;
color:#ff003c;
}

/* 按钮 */

.btns{
margin-top:40px;
display:flex;
gap:20px;
justify-content:center;
flex-wrap:wrap;
}

.btn{

padding:15px 35px;

border:2px solid #ff003c;

text-decoration:none;

color:white;

font-size:18px;

border-radius:40px;

backdrop-filter:blur(10px);

transition:0.4s;
}

.btn:hover{

background:#ff003c;

transform:translateY(-5px);

box-shadow:
0 0 20px #ff003c,
0 0 40px #ff003c;

}

/* 底部 */

.footer{

position:absolute;

bottom:20px;

width:100%;

text-align:center;

font-size:14px;

color:#aaa;

z-index:10;
}

</style>
</head>

<body>

<div class="hero">

<div class="overlay"></div>

<div class="content">

<div class="title">
QWE ARCHIVE
</div>

<div class="subtitle">
WELCOME TO MY DIGITAL WORLD
</div>

<div class="clock" id="clock">
00:00:00
</div>

<div class="btns">

<a class="btn" href="https://github.com/qqwe27510-tech" target="_blank">
GitHub
</a>

<a class="btn" href="#">
Projects
</a>

<a class="btn" href="#">
Contact
</a>

</div>

</div>

<div class="footer">
© 2026 QWE Archive
</div>

</div>

<script>

function updateClock(){

const now=new Date();

const h=String(now.getHours()).padStart(2,'0');
const m=String(now.getMinutes()).padStart(2,'0');
const s=String(now.getSeconds()).padStart(2,'0');

document.getElementById("clock").innerHTML=
`${h}:${m}:${s}`;

}

setInterval(updateClock,1000);

updateClock();

</script>

</body>
</html>
