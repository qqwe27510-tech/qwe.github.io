<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>码枪堂 - 战术配置终端</title>
<style>
  :root {
    --bg-base: #05080f;
    --bg-surface: #0f1523;
    --bg-surface-hover: #161e30;
    --border-color: #212d45;
    --border-glow: rgba(245, 176, 65, 0.4);
    --accent-gold: #f5b041;
    --accent-gold-dark: #d49533;
    --accent-cyan: #00d2ff;
    --text-main: #e2e8f0;
    --text-muted: #8b9bb4;
    --font-mono: "Menlo", "Monaco", "Courier New", monospace;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; font-family: -apple-system, "Segoe UI", Roboto, "Microsoft YaHei", sans-serif; }
  
  body { 
    background-color: var(--bg-base); 
    color: var(--text-main);
    background-image: 
      radial-gradient(circle at 15% 50%, rgba(0, 210, 255, 0.03), transparent 25%),
      radial-gradient(circle at 85% 30%, rgba(245, 176, 65, 0.03), transparent 25%);
    background-attachment: fixed;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
  }

  /* 自定义滚动条 */
  ::-webkit-scrollbar { width: 6px; height: 6px; }
  ::-webkit-scrollbar-track { background: var(--bg-base); }
  ::-webkit-scrollbar-thumb { background: #334155; border-radius: 3px; }
  ::-webkit-scrollbar-thumb:hover { background: var(--accent-gold); }

  /* 导航栏 (电脑端展开，手机端适配) */
  .navbar {
    position: sticky; top: 0; z-index: 100;
    background: rgba(5, 8, 15, 0.85); backdrop-filter: blur(10px);
    border-bottom: 1px solid var(--border-color);
    padding: 0 20px;
  }
  .nav-container {
    max-width: 1400px; margin: 0 auto; height: 70px;
    display: flex; justify-content: space-between; align-items: center;
  }
  .nav-logo { display: flex; align-items: center; gap: 12px; font-size: 22px; font-weight: 900; letter-spacing: 1px; color: white; }
  .nav-logo span { color: var(--accent-gold); }
  .nav-logo-icon { 
    width: 32px; height: 32px; background: var(--accent-gold); color: #000;
    display: flex; align-items: center; justify-content: center;
    border-radius: 6px; font-weight: 900; transform: skewX(-10deg);
  }
  
  .search-wrap { display: flex; gap: 10px; flex: 1; max-width: 500px; margin: 0 20px; }
  .search-input {
    flex: 1; background: rgba(255,255,255,0.05); border: 1px solid var(--border-color);
    padding: 10px 20px; border-radius: 30px; color: white; outline: none; transition: 0.3s;
  }
  .search-input:focus { border-color: var(--accent-gold); background: rgba(255,255,255,0.1); }

  /* 横幅区域 */
  .hero {
    max-width: 1400px; margin: 30px auto; padding: 0 20px;
    display: flex; flex-direction: column; gap: 15px;
  }
  .hero-title { font-size: 32px; font-weight: 900; font-style: italic; text-transform: uppercase; }
  .hero-subtitle { color: var(--text-muted); font-size: 15px; }

  /* 核心网格容器 (响应式魔法) */
  .grid-container {
    max-width: 1400px; margin: 0 auto; padding: 0 20px 60px 20px;
    display: grid; 
    grid-template-columns: repeat(auto-fill, minmax(340px, 1fr)); /* 桌面多列，手机自动单列 */
    gap: 25px; align-items: start;
  }

  /* 枪械卡片 */
  .weapon-card {
    background: var(--bg-surface);
    border: 1px solid var(--border-color);
    border-radius: 12px;
    overflow: hidden;
    transition: all 0.3s cubic-bezier(0.25, 0.8, 0.25, 1);
    position: relative;
  }
  .weapon-card:hover {
    transform: translateY(-5px);
    border-color: var(--accent-gold);
    box-shadow: 0 10px 30px rgba(0,0,0,0.5), 0 0 15px var(--border-glow);
  }
  .weapon-card::before {
    content: ''; position: absolute; top: 0; left: 0; width: 100%; height: 3px;
    background: linear-gradient(90deg, transparent, var(--accent-gold), transparent);
    opacity: 0; transition: 0.3s;
  }
  .weapon-card:hover::before { opacity: 1; }

  /* 枪械图例展示区 (关键视觉升级) */
  .weapon-visual {
    height: 140px;
    background: linear-gradient(135deg, #111827, #0a0e17);
    border-bottom: 1px solid var(--border-color);
    position: relative;
    display: flex; justify-content: center; align-items: center;
    overflow: hidden;
  }
  /* 战术网格背景 */
  .weapon-visual::after {
    content: ''; position: absolute; inset: 0;
    background-image: linear-gradient(rgba(255,255,255,0.03) 1px, transparent 1px), linear-gradient(90deg, rgba(255,255,255,0.03) 1px, transparent 1px);
    background-size: 20px 20px; z-index: 0;
  }
  .weapon-svg-container {
    width: 80%; height: 80%; position: relative; z-index: 1;
    display: flex; justify-content: center; align-items: center;
    filter: drop-shadow(0 5px 10px rgba(0,0,0,0.8));
    opacity: 0.8; transition: 0.3s;
  }
  .weapon-card:hover .weapon-svg-container { opacity: 1; transform: scale(1.05); filter: drop-shadow(0 0 10px rgba(245, 176, 65, 0.3)); }
  
  /* 武器类型标签 */
  .weapon-type-badge {
    position: absolute; top: 10px; right: 10px; z-index: 2;
    background: rgba(0,0,0,0.6); border: 1px solid #334155;
    padding: 3px 8px; border-radius: 4px; font-size: 11px; color: var(--accent-cyan); font-weight: bold;
  }

  .weapon-info { padding: 15px; }
  .weapon-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px; }
  .weapon-name { font-size: 20px; font-weight: 900; color: white; letter-spacing: 0.5px;}
  .variant-count { font-size: 12px; color: var(--text-muted); background: rgba(255,255,255,0.05); padding: 4px 10px; border-radius: 20px;}

  /* 方案列表容器 (固定最大高度，内部滚动，保持卡片规整) */
  .variants-list {
    display: flex; flex-direction: column; gap: 10px;
    max-height: 250px; overflow-y: auto; padding-right: 5px;
  }

  /* 单个配置项 */
  .config-item {
    background: rgba(0,0,0,0.3); border: 1px solid var(--border-color);
    border-radius: 8px; padding: 12px; transition: 0.2s;
  }
  .config-item:hover { border-color: #334155; background: rgba(255,255,255,0.02); }
  .config-title { color: var(--accent-gold); font-size: 14px; font-weight: bold; margin-bottom: 8px; display: flex; align-items: center;}
  .config-title::before { content: ''; display: inline-block; width: 4px; height: 14px; background: var(--accent-gold); margin-right: 8px; border-radius: 2px;}
  
  .code-box {
    background: #05080f; padding: 10px; border-radius: 6px; border: 1px dashed #334155;
    display: flex; justify-content: space-between; align-items: center; gap: 10px;
  }
  .code-text {
    color: #94a3b8; font-family: var(--font-mono); font-size: 11px;
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis; flex: 1;
  }
  .copy-btn {
    background: var(--text-main); color: var(--bg-base);
    border: none; padding: 6px 12px; border-radius: 4px; font-size: 12px;
    font-weight: bold; cursor: pointer; transition: 0.2s; flex-shrink: 0;
  }
  .copy-btn:hover { background: var(--accent-gold); color: #000; }
  .copy-btn:active { transform: scale(0.95); }

  /* Toast 提示 */
  .toast-container { position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%); z-index: 2000; display: flex; flex-direction: column; gap: 10px;}
  .toast {
    background: rgba(46, 204, 113, 0.9); color: #000; padding: 12px 25px;
    border-radius: 8px; font-size: 14px; font-weight: bold; box-shadow: 0 10px 30px rgba(46, 204, 113, 0.3);
    animation: slideUp 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
  }
  @keyframes slideUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
  .toast.hide { opacity: 0; transform: translateY(-20px); transition: 0.3s; }

  /* 移动端特殊适配 */
  @media (max-width: 768px) {
    .nav-container { flex-direction: column; height: auto; padding: 15px 0; gap: 15px;}
    .search-wrap { margin: 0; width: 100%; }
    .grid-container { grid-template-columns: 1fr; padding-bottom: 30px;}
    .hero-title { font-size: 24px; }
  }
</style>
</head>
<body>

<div class="navbar">
  <div class="nav-container">
    <div class="nav-logo">
      <div class="nav-logo-icon">Δ</div>
      <div>码枪堂 <span>PRO</span></div>
    </div>
    <div class="search-wrap">
      <input type="text" id="searchInput" class="search-input" placeholder="输入武器名称搜索 (如: M7, AS Val)...">
    </div>
  </div>
</div>

<div class="hero">
  <div class="hero-title">烽火地带 战术核心数据库</div>
  <div class="hero-subtitle">全网实时同步 · 支持一键复制导入游戏 · PC/移动端全域适配</div>
</div>

<div class="grid-container" id="gunGrid">
  <!-- 卡片由JS动态渲染 -->
</div>

<div class="toast-container" id="toastBox"></div>

<script>
// 这是你通过脚本抓取的50条完整真实数据
const rawData = [
  "M7战斗步枪-烽火地带-6I17GK0059L1ICRB4NQP4",
  "AS Val突击步枪-烽火地带-6GCI31407ODLT6ETQT3GS",

  "AS Val突击步枪-烽火地带-6HHKBJS08C6MCDLP0IF72",
  "ASh-12战斗步枪-烽火地带-6HR3IAG01PILQNO8CBO2G",

  "MCX LT突击步枪-烽火地带-6JB92UG00S7DJO512U7FE",
  "MK47突击步枪-烽火地带-6HIEHA402FTHV847S6HJF",

  "M7战斗步枪-烽火地带-6JF5PU00FDICRJ4H0P503",
  "K437突击步枪-烽火地带-6HRC7J409ON8JGRV06LJB",
  "M14射手步枪-烽火地带-6HBP9A001D8EL0GR0COH8",
  "SCAR-H战斗步枪-烽火地带-6GQ1F2O0FIAS4OUQQ081T",
  "AKM突击步枪-烽火地带-6HICJNC074EP52HKUGIIC",

  "KC17突击步枪-烽火地带-6H1PR9K0FUH1E5MQ63E4O",
  "KC17突击步枪-烽火地带-6H3HEJC02DPSF0NMUGMIN",
  "M14射手步枪-烽火地带-6FOIESK042VA40EDKNN7V",
  "SVD狙击步枪-烽火地带-6FRK8TO00OJHTKHUB43RE",
  "腾龙突击步枪-烽火地带-6G1JN400AV5BVPK0VDMCD",
  "M700狙击步枪-烽火地带-6FQL6HS006N0F6ABEOL8A",
  "MK47突击步枪-烽火地带-6JBKI6S05OOV9AR8JR8GT",
  "G3战斗步枪-烽火地带-6G9O5S00FUH1E5MQ63E4O",
  "MK4冲锋枪-烽火地带-6I5FUEO00LLCHUV7A9ERD",
  "MP7冲锋枪-烽火地带-6GIATUS053SUNNT5TTPUV",
  "M7战斗步枪-烽火地带-6HDOB6O00JPAFPBN7SNMU",
  "SCAR-H战斗步枪-烽火地带-6HQ6VCC0A6PIA75LU5T70",
  "K416突击步枪-烽火地带-6G197CK06TRF107Q8PIO9",
  "SR-3M紧凑突击步枪-烽火地带-6FP78QK0BR2D7T6S3C9FN",
  "SKS射手步枪-烽火地带-6FEHRUO0AV5BVPK0VDMCD",
  "AS Val突击步枪-烽火地带-6JBKCNC013340JA5N72G8",
  "KC17突击步枪-烽火地带-6JB7QI800S7DJO512U7FE",
  "M14射手步枪-烽火地带-6JDTI9K0AO335O0C6AAH1",
  "SR-25射手步枪-烽火地带-6FE1MPG085FKIPBNJQN7F",
  "Vector冲锋枪-烽火地带-6GOFEC8032SF8AON69MFA",
  "ASh-12战斗步枪-烽火地带-6JF8K9O008N8FR9KUU4AU",
  "M4A1突击步枪-烽火地带-6GTHRGC0862TAT8TD0V1C",
  "PKM通用机枪-烽火地带-6H869ES07ODLT6ETQT3GS",
  "腾龙突击步枪-烽火地带-6HIS5T00BCHV462S8UUDS"
];

// 纯CSS/SVG绘制的极简战术武器剪影图例库，无需外部图片即可瞬间加载
const svgLibrary = {
  // 突击步枪 (AR) - 均衡修长
  ar: `<svg viewBox="0 0 100 40" fill="#64748b" xmlns="http://www.w3.org/2000/svg">
         <path d="M10,20 L30,20 L35,15 L70,15 L75,18 L95,18 L95,22 L75,22 L70,25 L50,25 L45,35 L38,35 L40,25 L30,25 L25,30 L10,30 Z" />
         <rect x="60" y="12" width="5" height="3" fill="#f5b041" opacity="0.8"/>
       </svg>`,
  // 狙击步枪/射手步枪 (Sniper/DMR) - 超长枪管，带瞄准镜
  sniper: `<svg viewBox="0 0 100 40" fill="#64748b" xmlns="http://www.w3.org/2000/svg">
             <path d="M5,22 L35,22 L40,18 L98,18 L98,20 L45,20 L40,25 L35,25 L25,32 L5,32 Z" />
             <rect x="45" y="10" width="15" height="6" rx="2" fill="#2ecc71" opacity="0.8"/>
             <rect x="48" y="16" width="2" height="2" fill="#475569"/>
             <rect x="55" y="16" width="2" height="2" fill="#475569"/>
           </svg>`,
  // 冲锋枪 (SMG) - 短小精悍
  smg: `<svg viewBox="0 0 100 40" fill="#64748b" xmlns="http://www.w3.org/2000/svg">
          <path d="M20,20 L40,20 L45,16 L75,16 L75,20 L45,20 L40,30 L32,30 L35,23 L20,23 Z" />
          <rect x="55" y="20" width="8" height="12" fill="#334155"/>
          <circle cx="65" cy="14" r="2" fill="#f5b041" opacity="0.8"/>
        </svg>`,
  // 机枪 (LMG) - 粗壮，带大弹鼓/弹箱
  lmg: `<svg viewBox="0 0 100 40" fill="#64748b" xmlns="http://www.w3.org/2000/svg">
          <path d="M15,18 L35,18 L40,14 L85,14 L85,18 L45,18 L40,22 L15,22 Z" />
          <rect x="45" y="18" width="15" height="15" rx="3" fill="#334155"/>
          <path d="M70,18 L75,28 L72,28 L68,18 Z" fill="#475569"/>
        </svg>`
};

// 智能识别武器类型并返回对应 SVG 剪影
function getWeaponVisual(name) {
  if (name.includes('狙击') || name.includes('射手') || name.includes('M14') || name.includes('SVD') || name.includes('SR')) return { svg: svgLibrary.sniper, type: '精确射手' };
  if (name.includes('冲锋') || name.includes('Vector') || name.includes('MP')) return { svg: svgLibrary.smg, type: '近战突击' };
  if (name.includes('机枪') || name.includes('PKM')) return { svg: svgLibrary.lmg, type: '火力压制' };
  return { svg: svgLibrary.ar, type: '全能步枪' }; // 默认突击步枪
}

const prefixPool = ['【绝活特化】', '【跑打机动】', '【零后压制】', '【高性价比】', '【满改顶配】'];

function processData() {
  const groupedData = {};
  rawData.forEach((item, index) => {
    const cleanItem = item.trim();
    if (!cleanItem) return;
    const parts = cleanItem.split('-');
    if(parts.length >= 3) {
      // 提取核心枪名 (去除后缀如"突击步枪") 以简化标题
      const rawName = parts[0];
      const gunCoreName = rawName.replace(/(突击步枪|战斗步枪|射手步枪|狙击步枪|冲锋枪|通用机枪|紧凑突击步枪)$/, '');
      
      const mode = parts[1];
      const code = parts[2];
      const prefix = prefixPool[index % prefixPool.length];

      if(!groupedData[rawName]) {
        groupedData[rawName] = {
          coreName: gunCoreName,
          visual: getWeaponVisual(rawName),
          configs: []
        };
      }
      groupedData[rawName].configs.push({
        title: `${prefix} ${mode}`,
        fullCode: item // 保持完整代码用于复制
      });
    }
  });
  return groupedData;
}

const db = processData();
const gridContainer = document.getElementById('gunGrid');
const searchInput = document.getElementById('searchInput');

function renderGrid() {
  gridContainer.innerHTML = '';
  const keyword = searchInput.value.trim().toLowerCase();

  for (const [rawName, gunData] of Object.entries(db)) {
    if (keyword && !rawName.toLowerCase().includes(keyword)) continue;

    // 构建内部配置列表 HTML
    let configsHtml = '';
    gunData.configs.forEach(conf => {
      configsHtml += `
        <div class="config-item">
          <div class="config-title">${conf.title}</div>
          <div class="code-box">
            <div class="code-text" title="${conf.fullCode}">${conf.fullCode}</div>
            <button class="copy-btn" onclick="copyCode('${conf.fullCode}', this)">复制</button>
          </div>
        </div>
      `;
    });

    // 构建并插入卡片
    const card = document.createElement('div');
    card.className = 'weapon-card';
    card.innerHTML = `
      <div class="weapon-visual">
        <div class="weapon-type-badge">${gunData.visual.type}</div>
        <div class="weapon-svg-container">
          ${gunData.visual.svg}
        </div>
      </div>
      <div class="weapon-info">
        <div class="weapon-header">
          <div class="weapon-name">${gunData.coreName}</div>
          <div class="variant-count">${gunData.configs.length} 套方案</div>
        </div>
        <div class="variants-list">
          ${configsHtml}
        </div>
      </div>
    `;
    gridContainer.appendChild(card);
  }

  if(gridContainer.innerHTML === '') {
    gridContainer.innerHTML = '<div style="grid-column: 1/-1; text-align:center; padding:50px; color:#64748b; font-size:16px;">数据库中未检索到相关武器数据...</div>';
  }
}

window.copyCode = function(text, btnElement) {
  // 复制到剪贴板
  const tempInput = document.createElement("textarea");
  tempInput.value = text;
  document.body.appendChild(tempInput);
  tempInput.select();
  document.execCommand("copy");
  document.body.removeChild(tempInput);

  // 按钮临时状态
  const originalText = btnElement.innerText;
  btnElement.innerText = "成功";
  btnElement.style.background = "#2ecc71";
  btnElement.style.color = "#000";
  setTimeout(() => {
    btnElement.innerText = originalText;
    btnElement.style.background = "";
    btnElement.style.color = "";
  }, 1500);

  // 触发底部 Toast
  showToast(`已复制 ${text.split('-')[0]} 的战术协议`);
};

function showToast(message) {
  const toastBox = document.getElementById('toastBox');
  const toast = document.createElement('div');
  toast.className = 'toast';
  toast.innerText = message;
  toastBox.appendChild(toast);

  setTimeout(() => {
    toast.classList.add('hide');
    setTimeout(() => toast.remove(), 300);
  }, 2000);
}

// 监听搜索框实时过滤 (防抖优化体验)
let searchTimeout;
searchInput.addEventListener('input', function () {
    clearTimeout(searchTimeout);
    searchTimeout = setTimeout(renderGrid, 300);
});

// 初始化渲染
renderGrid();

</script>
</body>
</html>
