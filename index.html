<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>我的个人网站</title>

<style>
body{
    margin:0;
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    background:linear-gradient(
        135deg,
        #0f2027,
        #203a43,
        #2c5364
    );
    color:white;
    font-family:"Microsoft YaHei";
}

.card{
    text-align:center;
    background:rgba(255,255,255,0.1);
    padding:40px;
    border-radius:20px;
    backdrop-filter:blur(10px);
}

h1{
    font-size:48px;
}

p{
    font-size:20px;
}
</style>
</head>

<body>

<div class="card">
    <h1>欢迎来到我的网站</h1>
    <p>这是我使用 GitHub Pages 搭建的第一个网站</p>
</div>

</body>
</html>
